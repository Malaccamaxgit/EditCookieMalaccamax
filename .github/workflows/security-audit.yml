name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        components: clippy

    - name: Cache Cargo
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Cache npm dependencies
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install npm dependencies
      run: npm ci

    - name: Install cargo-audit
      run: cargo install cargo-audit --locked

    - name: Run cargo audit
      run: |
        echo "Running cargo audit..."
        cargo audit

    - name: Run npm audit
      run: |
        echo "Running npm audit..."
        npm audit --production --audit-level=moderate || exit 1

    - name: Run secret scanner
      run: |
        echo "Scanning for exposed secrets..."
        node scripts/secret-scanner.js || exit 1

    - name: Run cargo clippy
      run: |
        echo "Running cargo clippy..."
        cargo clippy --target wasm32-unknown-unknown -- -D warnings

    - name: Install Oxichrome
      run: cargo install oxichrome --locked

    - name: Build extension
      run: |
        echo "Building extension..."
        cargo oxichrome build --release

        # Post-build asset copy (mirrors scripts/Build-Extension.ps1)
        DIST="dist/chromium"
        cp public/css/popup.css public/css/options.css public/css/devtools.css public/css/fontawesome.min.css "$DIST/css/"
        cp -r public/webfonts "$DIST/"
        cp -r public/icons "$DIST/"
        cp public/devtools/panel.html "$DIST/devtools/panel.html"
        mkdir -p "$DIST/js"
        cp public/js/devtools-page.js "$DIST/js/devtools-page.js"

        # Patch manifest: add host_permissions, icons, remove web_accessible_resources
        python3 -c "
        import json, sys
        m = json.load(open('$DIST/manifest.json'))
        m.pop('web_accessible_resources', None)
        m.setdefault('host_permissions', ['<all_urls>'])
        m.setdefault('icons', {'16':'icons/icon-16.png','19':'icons/icon-19.png','32':'icons/icon-32.png','38':'icons/icon-38.png','48':'icons/icon-48.png','128':'icons/icon-128.png'})
        m.get('action',{}).setdefault('default_icon', {'16':'icons/icon-16.png','32':'icons/icon-32.png','48':'icons/icon-48.png'})
        json.dump(m, open('$DIST/manifest.json','w'), indent=2)
        "

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: |
        echo "Running Playwright tests..."
        xvfb-run --auto-servernum npx playwright test

    - name: Security summary
      if: success()
      run: |
        echo "Security Audit Passed"
        echo ""
        echo "All security checks completed successfully:"
        echo "  - No vulnerable Cargo dependencies"
        echo "  - No vulnerable npm dependencies"
        echo "  - No exposed secrets"
        echo "  - Clippy clean"
        echo "  - Build successful"
        echo "  - Tests passing"
